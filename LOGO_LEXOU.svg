<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Fond -->
  <circle cx="100" cy="100" r="100" fill="#0D1117"/>
  
  <!-- Dégradé pour le coeur -->
  <defs>
    <linearGradient id="heartGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF1493;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF69B4;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Coeur principal -->
  <path d="M100,160 
           C50,130 30,100 30,80 
           C30,60 45,50 60,50 
           C75,50 90,60 100,75 
           C110,60 125,50 140,50 
           C155,50 170,60 170,80 
           C170,100 150,130 100,160 Z" 
        fill="url(#heartGradient)" 
        filter="url(#glow)"/>
  
  <!-- Éclat central -->
  <ellipse cx="100" cy="90" rx="20" ry="25" fill="#FF69B4" opacity="0.6"/>
</svg>
